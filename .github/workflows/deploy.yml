name: Deploy

# Auto-deploys the backend (API + worker) to the Hostinger VPS Swarm stack.
# Runs on a self-hosted GitHub runner that lives on the VPS itself, so no
# inbound SSH is needed (Hostinger's cloud firewall blocks GitHub Actions IPs).
# The runner user owns /opt/indica-ai and is in the `docker` group.
on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "db/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & roll Swarm services on VPS
    runs-on: [self-hosted, indica-ai]
    timeout-minutes: 20
    steps:
      - name: Sync /opt/indica-ai to this commit
        run: |
          cd /opt/indica-ai
          git fetch --quiet origin main
          git reset --hard ${{ github.sha }}
          echo "deploying commit: $(git rev-parse --short HEAD)"

      - name: Build API image
        run: |
          cd /opt/indica-ai
          docker build --build-arg BINARY=api -t indica-ai/api:latest .

      - name: Build worker image
        run: |
          cd /opt/indica-ai
          docker build --build-arg BINARY=worker -t indica-ai/worker:latest .

      - name: Roll services
        run: |
          docker service update --force --image indica-ai/api:latest    indica-ai_indica-ai-api
          docker service update --force --image indica-ai/worker:latest indica-ai_indica-ai-worker
          docker service ls --filter name=indica-ai_indica-ai

      - name: Smoke /healthz
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 5 "https://api.181-215-134-11.sslip.io/healthz" > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "healthz not ready yet (attempt $i), retrying..."
            sleep 3
          done
          echo "healthz failed after retries" >&2
          exit 1
